<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nuke Counter - Start Display</title>
        <link rel="stylesheet" type="text/css" href="./style.css" />
        <script type="text/javascript" src="./counter.js" defer></script>
    </head>
    <body>
        <div class="shell">
            <div class="grid">
                <div class="metric kd-metric full-width">
                    <div class="label">K/D</div>
                    <div id="total-kd" class="count-side">0.00</div>
                </div>
                <div class="metric kill-metric">
                    <div class="label">Total Kills</div>
                    <div id="total-kill" class="count">0</div>
                </div>
                <div class="metric nuke-metric">
                    <div class="label">Total Nukes</div>
                    <div id="total-nuke" class="count">0</div>
                </div>

                <div class="metric history-panel">
                    <div class="history-title">Daily Records</div>
                    <ul id="daily-records" class="records-list">
                        <li class="record-empty">尚未有每日紀錄</li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- Edit Modal for OBS -->
        <div id="edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3>手動修改數據</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Today Kills (今日擊殺)</label>
                        <input type="number" id="input-today-kills" />
                    </div>
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Today Deaths (今日死亡)</label>
                        <input type="number" id="input-today-deaths" />
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Total Deaths (總死亡)</label>
                        <input type="number" id="input-total-deaths" />
                    </div>
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Total Kills (總擊殺)</label>
                        <input type="number" id="input-total-kills" />
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Total Nukes (總核彈)</label>
                        <input type="number" id="input-total-nukes" />
                    </div>
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <label>Today Nukes (今日核彈)</label>
                        <input type="number" id="input-today-nukes" />
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="btn-save">儲存 (Save)</button>
                    <button id="btn-cancel">取消 (Cancel)</button>
                </div>
            </div>
        </div>
    </body>
</html>
