<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nuke Counter</title>
        <link rel="stylesheet" type="text/css" href="./style.css" />
        <script type="text/javascript" src="./nuke_counter.js" defer></script>
    </head>
    <body>
        <div class="shell">
            <div class="grid">
                <div class="metric">
                    <div class="label">Total Kills</div>
                    <div id="total-kill" class="count">0</div>
                </div>
                <div class="metric">
                    <div class="label">Total Nukes</div>
                    <div id="total-nuke" class="count">0</div>
                </div>
                <div class="metric">
                    <div class="label">Today Kills</div>
                    <div id="today-kill" class="count-side">0</div>
                </div>
                <div class="metric">
                    <div class="label">Today Nukes</div>
                    <div id="today-nuke" class="count-side">0</div>
                </div>
            </div>
        </div>
        <!-- Edit Modal for OBS -->
        <div id="edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3>手動修改數據</h3>
                <div class="input-group">
                    <label>Total Kills (總擊殺)</label>
                    <input type="number" id="input-total-kills" />
                </div>
                <div class="input-group">
                    <label>Total Nukes (總核彈)</label>
                    <input type="number" id="input-total-nukes" />
                </div>
                <div class="modal-actions">
                    <button id="btn-save">儲存 (Save)</button>
                    <button id="btn-cancel">取消 (Cancel)</button>
                </div>
            </div>
        </div>
    </body>
</html>
